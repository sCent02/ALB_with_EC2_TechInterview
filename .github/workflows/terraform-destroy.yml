name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type YES to confirm destroy'
        required: true
        default: 'NO'

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: github.event.inputs.confirm_destroy == 'YES'
    runs-on: ubuntu-latest
    environment: aws-actions

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_VAR_ami_id: ${{ vars.AMI_ID }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_security_group_id: ${{ vars.SG_ID }}
          TF_VAR_instance_profile_name: ${{ vars.INSTANCE_PROFILE_NAME }}
          # For lists, use a JSON-style string
          TF_VAR_subnet_ids: "[${{ vars.SN_1 }}, ${{ vars.SN_2 }}]"
